{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6">
      <h1>Login</h1>
      <form method="post">{% csrf_token %}
        <div class="mb-3">{{ form.username.label_tag }} {{ form.username }}</div>
        <div class="mb-3">
          {{ form.password.label_tag }}
          <div class="position-relative">
            {{ form.password }}
            <button type="button" class="btn btn-sm password-toggle-btn" onclick="togglePassword('id_password', this)" tabindex="-1"
              style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;padding:0;color:#888;cursor:pointer;">
              <i class="fa fa-eye" id="icon_id_password"></i>
            </button>
          </div>
        </div>
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p class="mt-3"><a href="/accounts/signup/">Sign up</a> | <a href="/">Back</a></p>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(fieldId, btn) {
  const field = document.getElementById(fieldId);
  const icon = document.getElementById('icon_' + fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    field.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
{% endblock %}
